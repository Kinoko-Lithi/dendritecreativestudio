<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dendrite Creative Studio — Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="./style.css">
<style>
/* ============================= */
/* INDEX / HOME PAGE SPECIFIC CSS */
/* ============================= */

/* Vimeo background adjustments */
.video-background {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
  overflow: hidden;
}

.video-background iframe {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 177.77vh; /* 16:9 ratio to fully cover */
  height: 100vh;
  transform: translate(-50%, -50%);
  pointer-events: none;
  background: transparent;
}

/* Services text over the video */
.home-page .services-text {
  position: relative;
  z-index: 2;
  color: #000;        /* black letters */
  font-size: 28px;
  font-weight: 600;
  padding-left: 80px;  /* push slightly right */
  padding-top: 200px;  /* vertical positioning */
  line-height: 1.8;
}

/* Animate letters */
.home-page .services-text p {
  margin-bottom: 20px;
  opacity: 0;
  transform: translateY(20px);
  animation: fadeUp 0.8s ease forwards;
}

.home-page .services-text p:nth-child(1) { animation-delay: 0.2s; }
.home-page .services-text p:nth-child(2) { animation-delay: 0.4s; }
.home-page .services-text p:nth-child(3) { animation-delay: 0.6s; }
.home-page .services-text p:nth-child(4) { animation-delay: 0.8s; }

@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
</head>
<body class="home-page">

<!-- Vimeo background -->
<div class="video-background">
  <iframe src="https://player.vimeo.com/video/1167151626?background=1&autoplay=1&loop=1&muted=1"
    frameborder="0" allow="autoplay; fullscreen" allowfullscreen>
  </iframe>
</div>

<!-- Navigation -->
<nav class="nav">
  <div class="nav-container">
    <div class="logo-wrap">
      <a href="./index.html"><img src="./image/logo.png" alt="Logo"></a>
      <span class="logo-text">DENDRITE CREATIVE STUDIO</span>
    </div>
    <div class="nav-links">
      <a href="./index.html">Home</a>
      <div class="dropdown">
        <span class="nav-label">Works</span>
        <div class="dropdown-content">
          <a href="./videos.html">Videos</a>
          <a href="./images.html">Images</a>
        </div>
      </div>
      <a href="./about.html">About</a>
      <a href="./contact.html">Contact</a>
    </div>
  </div>
</nav>

<!-- Main content -->
<main class="page-content">
  <section class="services-text">
    <p>Graphic Design</p>
    <p>Video Art | Motion Graphics</p>
    <p>Live Stage Visuals</p>
    <p>Web Design</p>
  </section>
</main>

<footer>
  © 2026 Dendrite Creative Studio
</footer>

</body>
</html>
