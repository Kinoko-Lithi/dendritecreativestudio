<body>

<!-- VIMEO BACKGROUND -->

    src="https://player.vimeo.com/video/1167151626?background=1&autoplay=1&loop=1&muted=1&controls=0"
    frameborder="0"
    allow="autoplay; fullscreen"
    allowfullscreen>
  </iframe>
</div>

<!-- NAVIGATION -->
<nav class="nav">
  <div class="nav-container">
    <div class="logo-wrap">
      <a href="./index.html"><img src="./image/logo.png" alt="Logo"></a>
      <span class="logo-text">DENDRITE CREATIVE STUDIO</span>
    </div>
    <div class="nav-links">
      <a href="./index.html">Home</a>
      <div class="dropdown">
        <span class="nav-label">Works</span>
        <div class="dropdown-content">
          <a href="./videos.html">Videos</a>

      </div>

      <a href="./contact.html">Contact</a>
    </div>

<!-- MAIN CONTENT -->
<main class="page-content home-page">
  <section class="hero-section">
    <div class="services-text">
      <p>Graphic Design</p>
      <p>Video Art | Motion Graphics</p>
      <p>Live Stage Visuals</p>
      <p>Web Design</p>
    </div>
  </section>
</main>

<footer>
  © 2026 Dendrite Creative Studio
</footer>

<script>
  // Animate letters like original
  window.addEventListener("load", function() {
    const container = document.querySelector(".services-text");
    if (!container) return;

    container.querySelectorAll("p").forEach((line, index) => {
      const text = line.textContent;
      line.textContent = "";

      text.split("").forEach((char, i) => {
        const span = document.createElement("span");
        span.textContent = char === " " ? "\u00A0" : char;
        span.style.opacity = "0";
        span.style.transform = "translateY(8px)";
        span.style.display = "inline-block";
        span.style.transition = "opacity 0.4s ease, transform 0.4s ease";
        line.appendChild(span);

        setTimeout(() => {
          span.style.opacity = "1";
          span.style.transform = "translateY(0)";
        }, i*40 + index*250);
      });
    });
  });
</script>

</body>
</html>
