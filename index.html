<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dendrite Creative Studio — Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  html, body {
    height: 100%;
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background-color: #D9D9D9;
    color: #000;
    overflow-x: hidden;
  }

  /* NAVIGATION */
  .nav {
    position: fixed;
    top: 0;
    width: 100%;
    height: 70px;
    background: white;
    border-bottom: 1px solid #eee;
    z-index: 1000;
  }

  .nav-container {
    max-width: 1200px;
    margin: auto;
    height: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 40px;
  }

  .logo-wrap img { height: 40px; }
  .nav-links { display: flex; gap: 25px; }
  .nav-links a, .nav-label { text-decoration: none; color: #000; font-weight: 500; cursor: pointer; }

  .dropdown { position: relative; }
  .dropdown-content {
    position: absolute;
    top: 100%;
    left: 0;
    background: white;
    border: 1px solid #eee;
    display: none;
    flex-direction: column;
    min-width: 140px;
    padding: 10px 0;
    z-index: 1000;
  }
  .dropdown-content a { padding: 8px 15px; display: block; color: #000; text-decoration: none; }
  .dropdown-content a:hover { background: #f5f5f5; }
  .dropdown:hover .dropdown-content { display: flex; }

  /* VIDEO BACKGROUND */
  .video-background {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    overflow: hidden;
    background-color: #D9D9D9;
  }

  .video-background iframe {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 177.77vh; /* 16:9 ratio to fill screen */
    height: 100vh;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  /* HERO TEXT */
  .home-page .services-text {
    position: relative;
    padding-left: 80px;
    padding-top: 150px;
    font-size: 32px;
    font-weight: 600;
    line-height: 1.6;
    max-width: 600px;
    z-index: 1;
  }

  .home-page .services-text p {
    margin-bottom: 16px;
  }

  /* Animate letters individually */
  .services-text span {
    display: inline-block;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }

  /* FOOTER */
  footer {
    padding: 30px;
    text-align: center;
    background: #D9D9D9;
    font-size: 14px;
    margin-top: auto;
  }
</style>
</head>
<body>

<div class="video-background">
  <iframe src="https://player.vimeo.com/video/1167151626?background=1&autoplay=1&loop=1&muted=1"
    frameborder="0" allow="autoplay; fullscreen" allowfullscreen></iframe>
</div>

<nav class="nav">
  <div class="nav-container">
    <div class="logo-wrap">
      <a href="./index.html"><img src="./image/logo.png" alt="Logo"></a>
      <span class="logo-text">DENDRITE CREATIVE STUDIO</span>
    </div>
    <div class="nav-links">
      <a href="./index.html">Home</a>
      <div class="dropdown">
        <span class="nav-label">Works</span>
        <div class="dropdown-content">
          <a href="./videos.html">Videos</a>
          <a href="./images.html">Images</a>
        </div>
      </div>
      <a href="./about.html">About</a>
      <a href="./contact.html">Contact</a>
    </div>
  </div>
</nav>

<main class="page-content home-page">
  <section class="hero-section">
    <div class="services-text">
      <p>Graphic Design</p>
      <p>Video Art | Motion Graphics</p>
      <p>Live Stage Visuals</p>
      <p>Web Design</p>
    </div>
  </section>
</main>

<footer>
  © 2026 Dendrite Creative Studio
</footer>

<script>
  // Letter animation
  window.addEventListener("load", () => {
    const container = document.querySelector(".services-text");
    container.querySelectorAll("p").forEach((line, idx) => {
      const text = line.textContent;
      line.textContent = "";
      text.split("").forEach((char, i) => {
        const span = document.createElement("span");
        span.textContent = char === " " ? "\u00A0" : char;
        line.appendChild(span);
        setTimeout(() => {
          span.style.opacity = "1";
          span.style.transform = "translateY(0)";
        }, i*40 + idx*250);
      });
    });
  });
</script>

</body>
</html>
