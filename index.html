  <!-- Optional: add small script to animate letters sequentially -->
  <script>
    const spans = document.querySelectorAll('.services-text span');
    spans.forEach((span, i) => {
      setTimeout(() => {
        span.style.opacity = '1';
        span.style.transform = 'translateY(0)';
      }, i * 50); // stagger letters by 50ms
    });
  </script>
